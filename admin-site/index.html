<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PositivoS+ — Panel de Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #1c2030;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
      border: 1px solid #2d3148;
      text-align: center;
    }
    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #5b6bdd;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 32px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status-badge.enabled  { background: rgba(52,211,153,.12); color: #34d399; border: 1px solid rgba(52,211,153,.3); }
    .status-badge.disabled { background: rgba(239,68,68,.12);  color: #ef4444; border: 1px solid rgba(239,68,68,.3);  }
    .status-badge.unknown  { background: rgba(124,133,162,.1); color: #7c85a2; border: 1px solid rgba(124,133,162,.2); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .dot.pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    .clients { font-size: 12px; color: #7c85a2; margin-bottom: 28px; min-height: 16px; }
    hr { border: none; border-top: 1px solid #2d3148; margin: 0 0 24px; }
    .field { text-align: left; margin-bottom: 14px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7c85a2;
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 11px 13px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #5b6bdd; }
    button#toggleBtn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s, opacity .15s;
      margin-top: 4px;
    }
    button#toggleBtn:hover:not(:disabled) { filter: brightness(1.1); }
    button#toggleBtn:disabled { opacity: .5; cursor: not-allowed; }
    button#toggleBtn.btn-disable { background: #ef4444; color: #fff; }
    button#toggleBtn.btn-enable  { background: #34d399; color: #000; }
    button#toggleBtn.btn-loading { background: #2d3148; color: #7c85a2; }
    .msg { margin-top: 14px; font-size: 13px; min-height: 18px; }
    .msg.ok  { color: #34d399; }
    .msg.err { color: #ef4444; }
    .footer { margin-top: 28px; font-size: 11px; color: #3d4561; }
    .footer a { color: #5b6bdd; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">PositivoS+ en vivo</div>
    <h1>Panel de Control</h1>

    <div id="statusBadge" class="status-badge unknown">
      <span class="dot" id="dot"></span>
      <span id="statusText">Sin conectar</span>
    </div>
    <div class="clients" id="clients"></div>

    <hr>

    <form id="form">
      <div class="field">
        <label for="serverUrl">URL del servidor (Render)</label>
        <input type="url" id="serverUrl" placeholder="https://tu-proyecto.onrender.com" autocomplete="off">
      </div>
      <div class="field">
        <label for="token">Token de administrador</label>
        <input type="password" id="token" placeholder="••••••••••••" autocomplete="off">
      </div>
      <button type="submit" id="toggleBtn" class="btn-loading" disabled>Conectar</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="footer">
      Actualización automática cada 5 s &nbsp;·&nbsp;
      <a href="/privacy.html">Política de privacidad</a>
    </div>
  </div>

  <script>
    var currentEnabled = null;
    var serverUrl = '';

    var els = {
      badge:  document.getElementById('statusBadge'),
      dot:    document.getElementById('dot'),
      text:   document.getElementById('statusText'),
      btn:    document.getElementById('toggleBtn'),
      clients:document.getElementById('clients'),
      msg:    document.getElementById('msg'),
      urlIn:  document.getElementById('serverUrl'),
      tokenIn:document.getElementById('token'),
    };

    // Cargar valores guardados
    els.urlIn.value   = localStorage.getItem('ps_server_url')   || '';
    els.tokenIn.value = localStorage.getItem('ps_admin_token')  || '';
    serverUrl = els.urlIn.value.replace(/\/$/, '');
    if (serverUrl) fetchStatus();

    function updateUI(enabled, clients) {
      currentEnabled = enabled;
      els.badge.className  = 'status-badge ' + (enabled ? 'enabled' : 'disabled');
      els.dot.className    = 'dot' + (enabled ? ' pulse' : '');
      els.text.textContent = enabled ? 'ACTIVO — consumiendo tokens' : 'DESACTIVADO — sin consumo de tokens';
      els.btn.className    = enabled ? 'btn-disable' : 'btn-enable';
      els.btn.textContent  = enabled ? 'Desactivar servicio' : 'Activar servicio';
      els.btn.disabled     = false;
      if (typeof clients === 'number') {
        els.clients.textContent = clients === 0
          ? 'Sin usuarios conectados'
          : clients + ' usuario' + (clients !== 1 ? 's' : '') + ' conectado' + (clients !== 1 ? 's' : '');
      }
    }

    function setUnknown(reason) {
      currentEnabled = null;
      els.badge.className  = 'status-badge unknown';
      els.dot.className    = 'dot';
      els.text.textContent = reason || 'Sin conectar';
      els.btn.className    = 'btn-loading';
      els.btn.textContent  = 'Conectar';
      els.btn.disabled     = false;
      els.clients.textContent = '';
    }

    function setMsg(text, type) {
      els.msg.textContent = text;
      els.msg.className   = 'msg ' + (type || '');
      if (text) setTimeout(function() { els.msg.textContent = ''; els.msg.className = 'msg'; }, 5000);
    }

    function fetchStatus() {
      if (!serverUrl) return;
      fetch(serverUrl + '/api/status')
        .then(function(r) { return r.json(); })
        .then(function(d) { updateUI(d.enabled, d.clients); })
        .catch(function() { setUnknown('Error al conectar con el servidor'); });
    }

    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();

      var url   = els.urlIn.value.trim().replace(/\/$/, '');
      var token = els.tokenIn.value.trim();

      if (!url)   { setMsg('Ingresa la URL del servidor', 'err'); return; }
      if (!token) { setMsg('Ingresa el token de administrador', 'err'); return; }

      // Guardar en localStorage
      localStorage.setItem('ps_server_url',   url);
      localStorage.setItem('ps_admin_token',  token);
      serverUrl = url;

      // Si aún no tenemos estado, solo consultar
      if (currentEnabled === null) {
        fetchStatus();
        return;
      }

      // Hacer toggle
      els.btn.disabled    = true;
      els.btn.textContent = 'Procesando…';

      fetch(url + '/admin/toggle', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type':  'application/json',
        },
      })
        .then(function(r) {
          if (r.status === 401) { setMsg('Token incorrecto', 'err'); fetchStatus(); return null; }
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          updateUI(d.enabled);
          setMsg(
            d.enabled ? 'Servicio activado correctamente' : 'Servicio desactivado — tokens protegidos',
            'ok'
          );
        })
        .catch(function() {
          setMsg('Error al conectar con el servidor', 'err');
          fetchStatus();
        });
    });

    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
