<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PositivoS+ en vivo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding-bottom: 20px;
      /* Dual glow: magenta arriba-izquierda, verde abajo-derecha */
      background: #0a0a0a;
      background-image:
        radial-gradient(ellipse 240px 220px at -5% 0%,    rgba(187, 0, 204, 0.45) 0%, transparent 65%),
        radial-gradient(ellipse 260px 200px at 110% 108%, rgba(0,  214,  51, 0.40) 0%, transparent 65%);
    }

    /* ── Header ─────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .logo-wordmark { line-height: 1; }

    .brand-name {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #ffffff;
    }

    .brand-name .green { color: #00D633; }

    .brand-sub {
      font-size: 10px;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.04em;
      display: block;
      margin-top: 3px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #777;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .status-dot.connecting { background: #d4a017; }
    .status-dot.active     { background: #00D633; animation: ps-pulse 1.8s ease-in-out infinite; }
    .status-dot.error      { background: #e05252; }

    @keyframes ps-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Secciones ──────────────────────── */
    section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 10px;
    }

    .sub-label {
      font-size: 11px;
      color: #777;
      display: block;
      margin-bottom: 5px;
    }

    select {
      width: 100%;
      background: #161616;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 9px;
      padding: 9px 12px;
      color: #e8e8e8;
      font-size: 13px;
      cursor: pointer;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus { border-color: rgba(0, 214, 51, 0.45); }

    /* ── Swap ──────────────────────────── */
    .lang-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .lang-col { flex: 1; min-width: 0; }

    .swap-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #161616;
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: #666;
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-bottom: 2px;
    }

    .swap-btn:hover { border-color: rgba(0, 214, 51, 0.4); color: #00D633; }

    /* ── Botón principal ───────────────── */
    .main-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 16px 16px 0;
      padding: 13px;
      border-radius: 11px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .main-btn.start {
      background: #00D633;
      color: #000;
    }

    .main-btn.start:hover { background: #00eb38; }

    .main-btn.stop {
      background: rgba(224, 82, 82, 0.08);
      border: 1px solid rgba(224, 82, 82, 0.3);
      color: #e05252;
    }

    .main-btn.stop:hover { background: rgba(224, 82, 82, 0.14); }
    .main-btn:disabled   { opacity: 0.3; cursor: not-allowed; }

    /* ── Error ─────────────────────────── */
    #error-box {
      margin: 10px 16px 0;
      padding: 10px 12px;
      background: rgba(224, 82, 82, 0.07);
      border: 1px solid rgba(224, 82, 82, 0.25);
      border-radius: 9px;
      color: #e07070;
      font-size: 12px;
      display: none;
      line-height: 1.5;
    }

    /* ── Nota al pie ───────────────────── */
    .note {
      margin: 12px 16px 0;
      font-size: 11px;
      color: #444;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Slider ────────────────────────── */
    .duck-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .duck-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: #222;
      outline: none;
      cursor: pointer;
    }

    .duck-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #00D633;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .duck-row input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .duck-value {
      min-width: 68px;
      text-align: right;
      font-size: 12px;
      color: #777;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img class="logo-img" src="logo.jpg" alt="PositivoS+" />
      <div class="logo-wordmark">
        <span class="brand-name">POSITIVO <span class="green">S+</span></span>
        <span class="brand-sub">en vivo</span>
      </div>
    </div>
    <div class="status-row">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Detenido</span>
    </div>
  </header>

  <section>
    <span class="field-label">Dirección de traducción</span>
    <div class="lang-row">
      <div class="lang-col">
        <span class="sub-label">Ellos hablan</span>
        <select id="sourceLang"></select>
      </div>
      <button class="swap-btn" id="swapBtn" title="Intercambiar idiomas">&#x21C4;</button>
      <div class="lang-col">
        <span class="sub-label">Tú escuchas</span>
        <select id="targetLang"></select>
      </div>
    </div>
  </section>

  <section>
    <span class="field-label">Reducción de voz al traducir</span>
    <div class="duck-row">
      <input type="range" id="duckSlider" min="0" max="100" step="5" />
      <span class="duck-value" id="duckLabel"></span>
    </div>
  </section>

  <button class="main-btn start" id="mainBtn" disabled>Iniciar Traducción</button>

  <div id="error-box"></div>

  <p class="note" id="note">
    Abre una reunión de Teams y luego haz clic en "Iniciar Traducción".
  </p>

  <script src="popup.js"></script>
</body>
</html>
